<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cetak Label Barcode — Inventaris Kecamatan Tenjo</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    /* ── SCREEN UI ── */
    .barcode-toolbar {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 20px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .toolbar-group {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #475569;
    }

    .toolbar-group label { font-weight: 600; white-space: nowrap; }

    .toolbar-group select,
    .toolbar-group input[type="number"] {
      padding: 7px 10px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 13px;
      color: #334155;
      background: #f8fafc;
    }

    .toolbar-sep { width: 1px; height: 32px; background: #e2e8f0; margin: 0 4px; }

    .aset-selector {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .aset-selector-header {
      padding: 14px 20px;
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }

    .aset-selector-title {
      font-size: 14px;
      font-weight: 700;
      color: #1e293b;
    }

    .aset-selector-actions { display: flex; gap: 8px; }

    .btn-sm {
      padding: 5px 12px;
      font-size: 12px;
      border-radius: 6px;
      border: 1px solid #e2e8f0;
      background: #fff;
      cursor: pointer;
      color: #475569;
      font-weight: 500;
    }
    .btn-sm:hover { background: #f1f5f9; }
    .btn-sm.active { background: #eff6ff; border-color: #bfdbfe; color: #1d4ed8; }

    .search-bar {
      padding: 10px 16px;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      gap: 8px;
    }
    .search-bar input {
      flex: 1;
      padding: 7px 12px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 13px;
    }
    .search-bar select {
      padding: 7px 10px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 13px;
    }

    .aset-list {
      max-height: 320px;
      overflow-y: auto;
    }

    .aset-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      border-bottom: 1px solid #f1f5f9;
      cursor: pointer;
      transition: background 0.1s;
    }
    .aset-item:hover { background: #f8fafc; }
    .aset-item:last-child { border-bottom: none; }
    .aset-item.selected { background: #eff6ff; }

    .aset-item input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; accent-color: #1d4ed8; }

    .aset-item-info { flex: 1; min-width: 0; }
    .aset-item-nama { font-size: 13px; font-weight: 600; color: #1e293b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .aset-item-meta { font-size: 11px; color: #94a3b8; margin-top: 2px; }

    .aset-item-kib {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      background: #f1f5f9;
      color: #64748b;
      white-space: nowrap;
    }

    .selected-count {
      padding: 10px 16px;
      font-size: 12px;
      color: #64748b;
      background: #f8fafc;
      border-top: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .selected-count strong { color: #1d4ed8; }

    /* ── LABEL PREVIEW ── */
    .preview-section {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      overflow: hidden;
    }

    .preview-header {
      padding: 14px 20px;
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }

    .preview-title { font-size: 14px; font-weight: 700; color: #1e293b; }

    .preview-actions { display: flex; gap: 8px; }

    .label-grid {
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .label-empty {
      padding: 60px 20px;
      text-align: center;
      color: #94a3b8;
      font-size: 14px;
    }

    /* ── LABEL DESIGN ── */
    .label-card {
      border: 1.5px solid #334155;
      border-radius: 6px;
      overflow: hidden;
      background: #fff;
      font-family: 'Arial', sans-serif;
      position: relative;
    }

    .label-inner {
      display: flex;
      min-height: 120px;
    }

    /* Kolom 1 — Logo + Judul */
    .label-col1 {
      width: 90px;
      min-width: 90px;
      background: #1e3a5f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px 6px;
      gap: 6px;
    }

    .label-logo {
      width: 52px;
      height: 52px;
      object-fit: contain;
    }

    .label-logo-placeholder {
      width: 52px;
      height: 52px;
      border: 2px solid rgba(255,255,255,0.4);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    .label-tahun-inv {
      font-size: 7px;
      font-weight: 700;
      color: #fff;
      text-align: center;
      line-height: 1.3;
      letter-spacing: 0.3px;
    }

    /* Kolom 2 — Data */
    .label-col2 {
      flex: 1;
      padding: 8px 10px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 4px;
    }

    .label-data { flex: 1; }

    .label-row {
      display: flex;
      font-size: 11px;
      line-height: 1.5;
      color: #1e293b;
      gap: 3px;
    }

    .label-key {
      font-weight: 700;
      white-space: nowrap;
      min-width: 90px;
      color: #334155;
      font-size: 11px;
    }

    .label-val {
      flex: 1;
      font-weight: 400;
      word-break: break-word;
      font-size: 11px;
    }

    .label-code-wrap {
      margin-top: 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 6px;
      border-top: 1px dashed #e2e8f0;
    }

    .label-code-wrap canvas,
    .label-code-wrap img,
    .label-code-wrap svg {
      max-width: 100%;
      height: auto;
    }

    .label-code-text {
      font-size: 7px;
      color: #64748b;
      margin-top: 2px;
      font-family: monospace;
    }

        .label-row {
      display: flex;
      font-size: 11px;
      line-height: 1.5;
      color: #1e293b;
      gap: 3px;
    }
    
    .label-key {
      font-weight: 700;
      white-space: nowrap;
      min-width: 90px;
      color: #334155;
      text-align: left;   /* atau right kalau mau lebih rapat ke titik */
    }
    
    .label-sep {
      width: 8px;         /* lebar tetap untuk titik dua */
      text-align: center; /* titik tepat di tengah kolom */
    }
    
    .label-val {
      flex: 1;
      font-weight: 400;
      word-break: break-word;
    }

    /* ── PRINT STYLES ── */
    @media print {
      @page {
        size: A4 portrait;
        margin: 10mm 10mm 10mm 10mm;
      }

      body * { visibility: hidden; }
      #print-area, #print-area * { visibility: visible; }
      #print-area {
        position: fixed;
        top: 0; left: 0;
        width: 190mm;
      }

      .label-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 6mm;
        padding: 0;
      }

      .label-card {
        break-inside: avoid;
        page-break-inside: avoid;
      }

      .site-header, .barcode-toolbar, .aset-selector,
      .preview-header, .selected-count, nav, .page-header { display: none !important; }

      .preview-section { border: none; box-shadow: none; }
    }
  </style>
</head>
<body data-page="barcode">
  <div class="loading-overlay" id="loading"><div class="loading-spinner"></div></div>

  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="header-logo">
        <div class="header-logo-icon">🏛️</div>
        <div class="header-logo-text">
          <span class="title">Inventaris Barang</span>
          <span class="subtitle">Kecamatan Tenjo — Kab. Bogor</span>
        </div>
      </a>
      <nav class="header-nav"></nav>
    </div>
  </header>

  <main class="main-content">
    <div class="alert" id="alert-box"></div>

    <div class="page-header">
      <div>
        <h1>🏷️ Cetak Label Barcode</h1>
        <p>Pilih aset, atur opsi, lalu cetak atau unduh PDF label inventaris</p>
      </div>
      <a href="index.html" class="btn btn-secondary">← Kembali</a>
    </div>

    <!-- Toolbar -->
    <div class="barcode-toolbar">
      <div class="toolbar-group">
        <label>Jenis Kode:</label>
        <select id="opt-jenis-kode">
          <option value="qrcode">QR Code</option>
          <option value="barcode">Barcode (Code128)</option>
        </select>
      </div>
      <div class="toolbar-sep"></div>
      <div class="toolbar-group">
        <label>Tahun Inventarisasi:</label>
        <input type="number" id="opt-tahun" value="" min="2000" max="2099" style="width:80px">
      </div>
      <div class="toolbar-sep"></div>
      <div class="toolbar-group">
        <label>Data pada kode:</label>
        <select id="opt-data-kode">
          <option value="id">ID Barang</option>
          <option value="kode">Kode Barang</option>
          <option value="lengkap">Nama + Kode</option>
        </select>
      </div>
    </div>

    <!-- Pilih Aset -->
    <div class="aset-selector">
      <div class="aset-selector-header">
        <div class="aset-selector-title">📋 Pilih Aset untuk Dicetak</div>
        <div class="aset-selector-actions">
          <button class="btn-sm" id="btn-pilih-semua">Pilih Semua</button>
          <button class="btn-sm" id="btn-batal-semua">Batal Semua</button>
        </div>
      </div>
      <div class="search-bar">
        <input type="text" id="search-aset" placeholder="🔍 Cari nama barang atau kode...">
        <select id="filter-kib">
          <option value="">Semua KIB</option>
          <option value="KIB A">KIB A</option>
          <option value="KIB B">KIB B</option>
          <option value="KIB C">KIB C</option>
          <option value="KIB E">KIB E</option>
        </select>
      </div>
      <div class="aset-list" id="aset-list">
        <div style="padding:40px;text-align:center;color:#94a3b8">⏳ Memuat data aset...</div>
      </div>
      <div class="selected-count">
        <span>Dipilih: <strong id="jumlah-dipilih">0</strong> aset</span>
        <button class="btn btn-primary" id="btn-generate" style="padding:6px 16px;font-size:13px">
          🏷️ Generate Label
        </button>
      </div>
    </div>

    <!-- Preview & Cetak -->
    <div class="preview-section">
      <div class="preview-header">
        <div class="preview-title">🖨️ Preview Label</div>
        <div class="preview-actions">
          <button class="btn btn-secondary" id="btn-print" style="font-size:13px;padding:7px 14px">
            🖨️ Cetak
          </button>
          <button class="btn btn-primary" id="btn-pdf" style="font-size:13px;padding:7px 14px">
            📄 Download PDF
          </button>
        </div>
      </div>
      <div id="print-area">
        <div class="label-grid" id="label-grid">
          <div class="label-empty">
            Pilih aset di atas lalu klik <strong>Generate Label</strong>
          </div>
        </div>
      </div>
    </div>

  </main>

  <script src="supabase.js"></script>
  <script src="auth.js"></script>
  <script src="nav.js"></script>
  <script src="app.js"></script>
  <script>
  (async () => {
    const ready = await window._appReady;
    if (!ready) return;
    const db = window._authClient;

    const SKPD = 'Kecamatan Tenjo';
    let semuaAset = [];
    let selectedIds = new Set();

    // Set tahun default = tahun berjalan
    document.getElementById('opt-tahun').value = new Date().getFullYear();

    // ── LOAD ASET ──────────────────────────────────────
    async function loadAset() {
      showLoading(true);
      try {
        const { data, error } = await db.from('aset')
          .select('id, nama_barang, kode_barang, id_barang, tahun_perolehan, kib')
          .order('nama_barang');
        if (error) throw error;
        semuaAset = data || [];
        renderList(semuaAset);
      } catch (err) {
        showAlert('Gagal memuat data: ' + err.message, 'error');
      } finally {
        showLoading(false);
      }
    }

    // ── RENDER LIST ────────────────────────────────────
    function renderList(data) {
      const container = document.getElementById('aset-list');
      if (!data.length) {
        container.innerHTML = '<div style="padding:40px;text-align:center;color:#94a3b8">📭 Tidak ada aset ditemukan.</div>';
        return;
      }
      container.innerHTML = data.map(a => `
        <div class="aset-item ${selectedIds.has(a.id) ? 'selected' : ''}"
          data-id="${a.id}" onclick="toggleItem('${a.id}')">
          <input type="checkbox" ${selectedIds.has(a.id) ? 'checked' : ''}
            onclick="event.stopPropagation();toggleItem('${a.id}')">
          <div class="aset-item-info">
            <div class="aset-item-nama">${escH(a.nama_barang)}</div>
            <div class="aset-item-meta">${a.kode_barang || '—'} · ID: ${a.id_barang || '—'} · ${a.tahun_perolehan || '—'}</div>
          </div>
          <span class="aset-item-kib">${a.kib || '—'}</span>
        </div>
      `).join('');
      updateCount();
    }

    window.toggleItem = function(id) {
      if (selectedIds.has(id)) selectedIds.delete(id);
      else selectedIds.add(id);
      // update tampilan item
      const item = document.querySelector(`.aset-item[data-id="${id}"]`);
      if (item) {
        item.classList.toggle('selected', selectedIds.has(id));
        const cb = item.querySelector('input[type="checkbox"]');
        if (cb) cb.checked = selectedIds.has(id);
      }
      updateCount();
    };

    function updateCount() {
      document.getElementById('jumlah-dipilih').textContent = selectedIds.size;
    }

    // ── FILTER ─────────────────────────────────────────
    function applyFilter() {
      const q = document.getElementById('search-aset').value.toLowerCase();
      const kib = document.getElementById('filter-kib').value;
      const filtered = semuaAset.filter(a =>
        (!q || a.nama_barang?.toLowerCase().includes(q) || a.kode_barang?.toLowerCase().includes(q)) &&
        (!kib || a.kib === kib)
      );
      renderList(filtered);
    }

    let searchTimer;
    document.getElementById('search-aset').addEventListener('input', () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(applyFilter, 300);
    });
    document.getElementById('filter-kib').addEventListener('change', applyFilter);

    document.getElementById('btn-pilih-semua').addEventListener('click', () => {
      const visible = document.querySelectorAll('.aset-item');
      visible.forEach(el => selectedIds.add(el.dataset.id));
      applyFilter();
    });

    document.getElementById('btn-batal-semua').addEventListener('click', () => {
      selectedIds.clear();
      applyFilter();
    });

    // ── GENERATE KODE ──────────────────────────────────
function getKodeValue(aset) {
  const opt = document.getElementById('opt-data-kode').value;
  const base = window.location.origin + window.location.pathname.replace('barcode.html', '');

  if (opt === 'kode') {
    return `${base}view.html?kode=${encodeURIComponent(aset.kode_barang || aset.id)}`;
  }
  if (opt === 'lengkap') {
    // Pakai kode sebagai identifier utama (lebih human-readable)
    return `${base}view.html?kode=${encodeURIComponent(aset.kode_barang)}&id=${aset.id}`;
  }
  // Default: pakai UUID dengan parameter ?id= (sesuai view.html)
  return `${base}view.html?id=${aset.id}`;  // ← ?id= BENAR
}

    function buatQR(container, value) {
      container.innerHTML = '';
      new QRCode(container, {
        text: value,
        width: 72,
        height: 72,
        colorDark: '#1e293b',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M,
      });
    }

    function buatBarcode(container, value) {
      container.innerHTML = '';
      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      container.appendChild(svg);
      try {
        JsBarcode(svg, value, {
          format: 'CODE128',
          width: 1.2,
          height: 36,
          displayValue: false,
          margin: 0,
          lineColor: '#1e293b',
          background: '#ffffff',
        });
      } catch (_) {
        container.innerHTML = '<span style="font-size:9px;color:#ef4444">Kode tidak valid</span>';
      }
    }

    // ── BUILD LABEL HTML ───────────────────────────────
    function buildLabel(aset, jenisKode, tahun) {
      const wrap = document.createElement('div');
      wrap.className = 'label-card';
      wrap.innerHTML = `
        <div class="label-inner">
          <div class="label-col1">
            <img class="label-logo" src="logo-bogor.png">
            <div class="label-tahun-inv">INVENTARISASI<br>BMD TAHUN<br>${tahun}</div>
          </div>
          <div class="label-col2">
            <div class="label-data">
            <div class="label-row">
              <span class="label-key">SKPD</span>
              <span class="label-sep">:</span>
              <span class="label-val">${escH(SKPD)}</span>
            </div>
            <div class="label-row">
              <span class="label-key">NAMA BARANG</span>
              <span class="label-sep">:</span>
              <span class="label-val">${escH(aset.nama_barang || '—')}</span>
            </div>
            <div class="label-row">
              <span class="label-key">KODE BARANG</span>
              <span class="label-sep">:</span>
              <span class="label-val">${escH(aset.kode_barang || '—')}</span>
            </div>
            <div class="label-row">
              <span class="label-key">ID BARANG</span>
              <span class="label-sep">:</span>
              <span class="label-val">${escH(String(aset.id_barang || '—'))}</span>
            </div>
            <div class="label-row">
  <span class="label-key">TAHUN PEROLEHAN</span>
  <span class="label-sep">:</span>
  <span class="label-val">${escH(String(aset.tahun_perolehan || '—'))}</span>
</div>
            </div>
            <div class="label-code-wrap" id="code-${aset.id}"></div>
          </div>
        </div>
      `;
      return wrap;
    }

    // ── GENERATE SEMUA LABEL ───────────────────────────
    document.getElementById('btn-generate').addEventListener('click', () => {
      if (selectedIds.size === 0) {
        showAlert('Pilih minimal 1 aset terlebih dahulu!', 'error');
        return;
      }
      const jenisKode = document.getElementById('opt-jenis-kode').value;
      const tahun = document.getElementById('opt-tahun').value || new Date().getFullYear();
      const grid = document.getElementById('label-grid');
      grid.innerHTML = '';

      const dipilih = semuaAset.filter(a => selectedIds.has(a.id));
      dipilih.forEach(aset => {
        const labelEl = buildLabel(aset, jenisKode, tahun);
        grid.appendChild(labelEl);

        // Generate kode setelah elemen masuk DOM
        const codeWrap = labelEl.querySelector(`#code-${aset.id}`);
        const kodeVal = getKodeValue(aset);

        if (jenisKode === 'qrcode') {
          buatQR(codeWrap, kodeVal);
        } else {
          buatBarcode(codeWrap, kodeVal);
        }
        const codeText = document.createElement('div');
        codeText.className = 'label-code-text';
        codeText.textContent = kodeVal.length > 30 ? kodeVal.substring(0, 30) + '...' : kodeVal;
        codeWrap.appendChild(codeText);
      });

      showAlert(`✅ ${dipilih.length} label berhasil digenerate!`);
      document.getElementById('label-grid').scrollIntoView({ behavior: 'smooth', block: 'start' });
    });

    // ── CETAK ──────────────────────────────────────────
    document.getElementById('btn-print').addEventListener('click', () => {
      const grid = document.getElementById('label-grid');
      if (!grid.querySelector('.label-card')) {
        showAlert('Generate label terlebih dahulu!', 'error'); return;
      }
      window.print();
    });

    // ── DOWNLOAD PDF ───────────────────────────────────
    document.getElementById('btn-pdf').addEventListener('click', async () => {
      const grid = document.getElementById('label-grid');
      if (!grid.querySelector('.label-card')) {
        showAlert('Generate label terlebih dahulu!', 'error'); return;
      }
      showLoading(true);
      try {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
        const labels = grid.querySelectorAll('.label-card');
        const margin = 10;
        const colW = (210 - margin * 2 - 6) / 2;
        let x = margin, y = margin;
        let labelH = 0;

        for (let i = 0; i < labels.length; i++) {
          const canvas = await html2canvas(labels[i], { scale: 2, useCORS: true, backgroundColor: '#fff' });
          const imgData = canvas.toDataURL('image/png');
          const ratio = canvas.height / canvas.width;
          const h = colW * ratio;

          if (labelH === 0) labelH = h;

          // Cek apakah perlu halaman baru
          if (y + h > 297 - margin) {
            pdf.addPage();
            y = margin;
          }

          pdf.addImage(imgData, 'PNG', x, y, colW, h);

          if (i % 2 === 0) {
            x = margin + colW + 6;
          } else {
            x = margin;
            y += h + 6;
          }
        }

        const tahun = document.getElementById('opt-tahun').value || new Date().getFullYear();
        pdf.save(`Label_BMD_${SKPD.replace(/\s+/g, '_')}_${tahun}.pdf`);
        showAlert('✅ PDF berhasil diunduh!');
      } catch (err) {
        showAlert('Gagal generate PDF: ' + err.message, 'error');
      } finally {
        showLoading(false);
      }
    });

    // ── UTILS ──────────────────────────────────────────
    function escH(s) {
      if (!s) return '';
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ── INIT ───────────────────────────────────────────
    await loadAset();
  })();
  </script>
</body>
</html>
