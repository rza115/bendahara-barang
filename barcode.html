<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cetak Label Barcode — Inventaris Kecamatan Tenjo</title>
  >
  >
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    .barcode-toolbar {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 20px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }
    .toolbar-group {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #475569;
    }
    .toolbar-group label { font-weight: 600; white-space: nowrap; }
    .toolbar-group select,
    .toolbar-group input[type="number"] {
      padding: 7px 10px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 13px;
      color: #334155;
      background: #f8fafc;
    }
    .toolbar-sep { width: 1px; height: 32px; background: #e2e8f0; margin: 0 4px; }
    .aset-selector {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 20px;
    }
    .aset-selector-header {
      padding: 14px 20px;
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }
    .aset-selector-title { font-size: 14px; font-weight: 700; color: #1e293b; }
    .aset-selector-actions { display: flex; gap: 8px; }
    .btn-sm {
      padding: 5px 12px;
      font-size: 12px;
      border-radius: 6px;
      border: 1px solid #e2e8f0;
      background: #fff;
      cursor: pointer;
      color: #475569;
      font-weight: 500;
    }
    .btn-sm:hover { background: #f1f5f9; }
    .search-bar {
      padding: 10px 16px;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      gap: 8px;
    }
    .search-bar input {
      flex: 1;
      padding: 7px 12px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 13px;
    }
    .search-bar select {
      padding: 7px 10px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 13px;
    }
    .aset-list { max-height: 320px; overflow-y: auto; }
    .aset-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      border-bottom: 1px solid #f1f5f9;
      cursor: pointer;
      transition: background 0.1s;
    }
    .aset-item:hover { background: #f8fafc; }
    .aset-item:last-child { border-bottom: none; }
    .aset-item.selected { background: #eff6ff; }
    .aset-item input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; accent-color: #1d4ed8; }
    .aset-item-info { flex: 1; min-width: 0; }
    .aset-item-nama { font-size: 13px; font-weight: 600; color: #1e293b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .aset-item-meta { font-size: 11px; color: #94a3b8; margin-top: 2px; }
    .aset-item-kib {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      background: #f1f5f9;
      color: #64748b;
      white-space: nowrap;
    }
    .selected-count {
      padding: 10px 16px;
      font-size: 12px;
      color: #64748b;
      background: #f8fafc;
      border-top: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .selected-count strong { color: #1d4ed8; }
    .preview-section {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      overflow: hidden;
    }
    .preview-header {
      padding: 14px 20px;
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }
    .preview-title { font-size: 14px; font-weight: 700; color: #1e293b; }
    .preview-actions { display: flex; gap: 8px; }
    .label-grid {
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }
    .label-empty { padding: 60px 20px; text-align: center; color: #94a3b8; font-size: 14px; }
    .label-card {
      border: 1.5px solid #334155;
      border-radius: 6px;
      overflow: hidden;
      background: #fff;
      font-family: 'Arial', sans-serif;
      position: relative;
    }
    .label-inner { display: flex; min-height: 120px; }
    .label-col1 {
      width: 90px;
      min-width: 90px;
      background: #1e3a5f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px 6px;
      gap: 6px;
    }
    .label-logo { width: 52px; height: 52px; object-fit: contain; }
    .label-tahun-inv {
      font-size: 7px;
      font-weight: 700;
      color: #fff;
      text-align: center;
      line-height: 1.3;
      letter-spacing: 0.3px;
    }
    .label-col2 {
      flex: 1;
      padding: 8px 10px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 4px;
    }
    .label-data { flex: 1; }
    .label-row { display: flex; font-size: 11px; line-height: 1.5; color: #1e293b; gap: 3px; }
    .label-key { font-weight: 700; white-space: nowrap; min-width: 90px; color: #334155; font-size: 11px; }
    .label-sep { width: 8px; text-align: center; }
    .label-val { flex: 1; font-weight: 400; word-break: break-word; font-size: 11px; }
    .label-code-wrap {
      margin-top: 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 6px;
      border-top: 1px dashed #e2e8f0;
    }
    .label-code-wrap canvas,
    .label-code-wrap img,
    .label-code-wrap svg { max-width: 100%; height: auto; }
    .label-code-text { font-size: 7px; color: #64748b; margin-top: 2px; font-family: monospace; }
    @media print {
      @page { size: A4 portrait; margin: 10mm; }
      body * { visibility: hidden; }
      #print-area, #print-area * { visibility: visible; }
      #print-area { position: fixed; top: 0; left: 0; width: 190mm; }
      .label-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6mm; padding: 0; }
      .label-card { break-inside: avoid; page-break-inside: avoid; }
      .site-header, .barcode-toolbar, .aset-selector,
      .preview-header, .selected-count, nav, .page-header { display: none !important; }
      .preview-section { border: none; box-shadow: none; }
    }
  </style>
</head>
<body data-page="barcode">

  <div class="loading-overlay" id="loading"><div class="loading-spinner"></div></div>
  <div class="alert" id="alert-box"></div>

  <div id="page-body">

    <div class="page-header">
      <div>
        <h1>🏷️ Cetak Label Barcode</h1>
        <p>Pilih aset, atur opsi, lalu cetak atau unduh PDF label inventaris</p>
      </div>
      <a href="index.html" class="btn btn-secondary">← Kembali</a>
    </div>

    <div class="barcode-toolbar">
      <div class="toolbar-group">
        abel>Jenis Kode:</label>
        <select id="opt-jenis-kode">
          <option value="qrcode">QR Code</option>
          <option value="barcode">Barcode (Code128)</option>
        </select>
      </div>
      <div class="toolbar-sep"></div>
      <div class="toolbar-group">
        abel>Tahun Inventarisasi:</label>
        <input type="number" id="opt-tahun" value="" min="2000" max="2099" style="width:80px">
      </div>
      <div class="toolbar-sep"></div>
      <div class="toolbar-group">
        abel>Data pada kode:</label>
        <select id="opt-data-kode">
          <option value="id">ID Barang</option>
          <option value="kode">Kode Barang</option>
          <option value="lengkap">Nama + Kode</option>
        </select>
      </div>
    </div>

    <div class="aset-selector">
      <div class="aset-selector-header">
        <div class="aset-selector-title">📋 Pilih Aset untuk Dicetak</div>
        <div class="aset-selector-actions">
          <button class="btn-sm" id="btn-pilih-semua">Pilih Semua</button>
          <button class="btn-sm" id="btn-batal-semua">Batal Semua</button>
        </div>
      </div>
      <div class="search-bar">
        <input type="text" id="search-aset" placeholder="🔍 Cari nama barang atau kode...">
        <select id="filter-kib">
          <option value="">Semua KIB</option>
          <option value="KIB A">KIB A</option>
          <option value="KIB B">KIB B</option>
          <option value="KIB C">KIB C</option>
          <option value="KIB E">KIB E</option>
        </select>
      </div>
      <div class="aset-list" id="aset-list">
        <div style="padding:40px;text-align:center;color:#94a3b8">⏳ Memuat data aset...</div>
      </div>
      <div class="selected-count">
        <span>Dipilih: <strong id="jumlah-dipilih">0</strong> aset</span>
        <button class="btn btn-primary" id="btn-generate" style="padding:6px 16px;font-size:13px">
          🏷️ Generate Label
        </button>
      </div>
    </div>

    <div class="preview-section">
      <div class="preview-header">
        <div class="preview-title">🖨️ Preview Label</div>
        <div class="preview-actions">
          <button class="btn btn-secondary" id="btn-print" style="font-size:13px;padding:7px 14px">🖨️ Cetak</button>
          <button class="btn btn-primary"   id="btn-pdf"   style="font-size:13px;padding:7px 14px">📄 Download PDF</button>
        </div>
      </div>
      <div id="print-area">
        <div class="label-grid" id="label-grid">
          <div class="label-empty">Pilih aset di atas lalu klik <strong>Generate Label</strong></div>
        </div>
      </div>
    </div>

  </div>

  <script src="supabase.js"></script>
  <script src="shared/auth/auth-guard.js"></script>
  <script src="nav.js"></script>
  <script src="shared/utils/constants.js"></script>
  <script src="shared/utils/dom.js"></script>
  <script src="shared/utils/formatters.js"></script>
  <script src="shared/ui/feedback.js"></script>
  <script src="features/barcode/barcode-service.js"></script>
  <script src="features/barcode/barcode-page.js"></script>
  <script src="main.js"></script>
</body>
</html>
