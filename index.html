<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventaris Barang — Kecamatan Tenjo</title>
  <link rel="stylesheet" href="../assets/styles/sidebar.css">
  <link rel="stylesheet" href="../assets/styles/style.css">
</head>
<body data-page="index">

  <div class="loading-overlay" id="loading">
    <div class="loading-spinner"></div>
  </div>
  <div class="alert" id="alert-box"></div>

  <div id="page-body">
    <!-- Page Header -->
    <div class="page-header">
      <div>
        <h1>Kartu Inventaris Barang</h1>
        <p>Daftar seluruh aset tetap per 31 Desember 2025</p>
      </div>
      <a href="tambah.html" class="btn btn-primary">&#10010; Tambah Aset</a>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card accent">
        <div class="stat-icon"></div>
        <div class="stat-value" id="total-aset"></div>
        <div class="stat-label">Total Aset</div>
      </div>
      <div class="stat-card gold">
        <div class="stat-icon"></div>
        <div class="stat-value" id="total-nilai" style="font-size:14px"></div>
        <div class="stat-label">Total Nilai</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">&#127966;&#65039;</div>
        <div class="stat-value" id="total-kib-a"></div>
        <div class="stat-label">KIB A &mdash; Tanah</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">&#9881;&#65039;</div>
        <div class="stat-value" id="total-kib-b"></div>
        <div class="stat-label">KIB B &mdash; Peralatan</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon"></div>
        <div class="stat-value" id="total-kib-c"></div>
        <div class="stat-label">KIB C &mdash; Gedung</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon"></div>
        <div class="stat-value" id="total-kib-e"></div>
        <div class="stat-label">KIB E &mdash; Lainnya</div>
      </div>
    </div>

    <!-- Filter Bar -->
    <div class="filter-bar">
      <div class="search-wrap">
        <span class="search-icon"></span>
        <input type="text" id="search-input" placeholder="Cari nama barang...">
      </div>
      <select id="filter-kib" style="width:auto">
        <option value="">Semua KIB</option>
        <option value="KIB A">KIB A &mdash; Tanah</option>
        <option value="KIB B">KIB B &mdash; Peralatan &amp; Mesin</option>
        <option value="KIB C">KIB C &mdash; Gedung &amp; Bangunan</option>
        <option value="KIB E">KIB E &mdash; Aset Tetap Lainnya</option>
      </select>
      <select id="filter-kondisi" style="width:auto">
        <option value="">Semua Kondisi</option>
        <option value="Baik">Baik</option>
        <option value="Rusak Ringan">Rusak Ringan</option>
        <option value="Rusak Berat">Rusak Berat</option>
      </select>
      <select id="sort-by" style="width:auto">
        <option value="">Urutkan</option>
        <option value="terbaru">Tahun Terbaru</option>
        <option value="terlama">Tahun Terlama</option>
        <option value="harga-tertinggi">Harga Tertinggi</option>
        <option value="harga-terendah">Harga Terendah</option>
        <option value="nama-az">Nama A&ndash;Z</option>
        <option value="nama-za">Nama Z&ndash;A</option>
      </select>
      <select id="limit-rows" style="width:auto">
        <option value="100">100 Data</option>
        <option value="200">200 Data</option>
        <option value="500">500 Data</option>
        <option value="all" selected>Semua Data</option>
      </select>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>No</th>
            <th>Nama Barang</th>
            <th>KIB</th>
            <th>Tahun</th>
            <th>Harga</th>
            <th>Kondisi</th>
            <th>Lokasi/Penggunaan</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="aset-tbody">
          <tr><td colspan="8" class="empty-state"><div></div><p>Memuat data...</p></td></tr>
        </tbody>
      </table>
    </div>
  </div><!-- /page-body -->

  <!-- Scripts: urutan PENTING -->
  <script src="../supabase.js"></script>
  <script src="../shared/auth/auth-guard.js"></script>
  <script src="../nav.js"></script>
  <script src="sidebar.js"></script>
  <script src="../shared/utils/constants.js"></script>
  <script src="../shared/utils/dom.js"></script>
  <script src="../shared/utils/formatters.js"></script>
  <script src="../shared/ui/feedback.js"></script>
  <script src="../features/barang/barang-state.js"></script>
  <script src="../features/barang/barang-service.js"></script>
  <script src="../features/barang/barang-view.js"></script>
  <script src="../features/barang/barang-page.js"></script>
  <script src="../main.js"></script>
</body>
</html>
