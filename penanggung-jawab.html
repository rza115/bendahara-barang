<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kelola Penanggung Jawab — Inventaris Kecamatan Tenjo</title>
  <link rel="stylesheet" href="sidebar.css">
  <link rel="stylesheet" href="style.css">
  <style>
    .pj-table{width:100%;border-collapse:collapse}
    .pj-table th{padding:10px 12px;font-size:11px;font-weight:600;text-transform:uppercase;
      letter-spacing:.06em;color:var(--text-muted);background:var(--bg);
      border-bottom:2px solid var(--border);text-align:left}
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);
      z-index:1000;align-items:center;justify-content:center}
    .modal-box{background:var(--surface);border-radius:var(--radius);
      padding:28px;width:100%;max-width:480px;box-shadow:0 8px 32px rgba(0,0,0,.18)}
    .modal-title{font-size:16px;font-weight:700;margin-bottom:20px}
    .field-group{display:flex;flex-direction:column;gap:4px;margin-bottom:14px}
    .field-label{font-size:11px;font-weight:600;text-transform:uppercase;
      letter-spacing:.06em;color:var(--text-muted)}
    .field-input{padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius);
      font-size:13px;background:var(--bg);color:var(--text-primary);width:100%}
    .field-input:focus{outline:none;border-color:var(--accent)}
    .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
  </style>
</head>
<body data-page="pj">
  <div class="loading-overlay" id="loading"><div class="loading-spinner"></div></div>
  <div class="alert" id="alert-box"></div>

  <!-- Modal Tambah/Edit PJ -->
  <div class="modal-overlay" id="modal-pj">
    <div class="modal-box">
      <div class="modal-title" id="modal-pj-title">Tambah Penanggung Jawab</div>
      <div class="field-group">
        <label class="field-label" for="pj-nama">Nama <span style="color:red">*</span></label>
        <input class="field-input" id="pj-nama" type="text" placeholder="Nama lengkap">
      </div>
      <div class="field-group">
        <label class="field-label" for="pj-nip">NIP</label>
        <input class="field-input" id="pj-nip" type="text" placeholder="NIP (opsional)">
      </div>
      <div class="field-group">
        <label class="field-label" for="pj-jabatan">Jabatan</label>
        <input class="field-input" id="pj-jabatan" type="text" placeholder="Jabatan">
      </div>
      <div class="field-group">
        <label class="field-label" for="pj-unit-kerja">Unit Kerja</label>
        <input class="field-input" id="pj-unit-kerja" type="text" placeholder="Unit kerja" value="Kecamatan Tenjo">
      </div>
      <div class="field-group">
        <label class="field-label" for="pj-no-hp">No. HP</label>
        <input class="field-input" id="pj-no-hp" type="text" placeholder="Nomor HP">
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="btn-batal-pj">Batal</button>
        <button class="btn btn-primary" id="btn-simpan-pj">💾 Simpan</button>
      </div>
    </div>
  </div>

  <div id="page-body">
    <div class="page-header">
      <h1>👤 Kelola Penanggung Jawab</h1>
      <div>
        <button class="btn btn-primary" id="btn-tambah-pj">+ Tambah PJ</button>
      </div>
    </div>

    <div class="form-card" style="max-width:100%">
      <div style="overflow-x:auto">
        <table class="pj-table">
          <thead>
            <tr>
              <th>No</th>
              <th>Nama</th>
              <th>NIP</th>
              <th>Jabatan</th>
              <th>Unit Kerja</th>
              <th>Jml Aset</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody id="pj-tbody">
            <tr><td colspan="7" style="text-align:center;padding:40px;color:#94a3b8">Memuat data...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="supabase.js"></script>
  <script src="shared/auth/auth-guard.js"></script>
  <script src="nav.js"></script>
  <script src="shared/utils/constants.js"></script>
  <script src="shared/utils/dom.js"></script>
  <script src="shared/utils/formatters.js"></script>
  <script src="shared/ui/feedback.js"></script>
  <script src="features/penanggung-jawab/pj-service.js"></script>
  <script src="features/penanggung-jawab/pj-page.js"></script>
  <script src="main.js"></script>
</body>
</html>
